<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#FFD700" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <meta name="mobile-web-app-capable" content="yes" />
    <link rel="icon" href="/assets/favicon.png" />
    <title>IKEA India</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: "DM Sans", sans-serif;
        background: #003087;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
        position: relative;
      }

      /* ── Background decorations ── */
      .bg-circle {
        position: absolute;
        border-radius: 50%;
        pointer-events: none;
      }
      .bg-circle-1 {
        width: 500px;
        height: 500px;
        background: rgba(255, 215, 0, 0.05);
        top: -180px;
        right: -180px;
      }
      .bg-circle-2 {
        width: 320px;
        height: 320px;
        background: rgba(255, 215, 0, 0.04);
        bottom: -100px;
        left: -80px;
      }
      .bg-text {
        position: absolute;
        font-family: "Syne", sans-serif;
        font-size: 22vw;
        font-weight: 800;
        color: rgba(255, 215, 0, 0.03);
        letter-spacing: -8px;
        user-select: none;
        pointer-events: none;
        bottom: -2vw;
        left: 50%;
        transform: translateX(-50%);
        white-space: nowrap;
      }

      /* ── Center card ── */
      .card {
        position: relative;
        z-index: 10;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 32px;
        padding: 0 20px;
        text-align: center;
      }

      /* ── Logo ── */
      .logo-wrap {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 6px;
        animation: fadeDown 0.6s ease both;
      }
      .logo {
        font-family: "Syne", sans-serif;
        font-size: clamp(3.5rem, 12vw, 5.5rem);
        font-weight: 800;
        color: #ffd700;
        letter-spacing: -4px;
        line-height: 1;
      }
      .logo-badge {
        background: rgba(255, 215, 0, 0.12);
        color: #ffd700;
        padding: 4px 14px;
        border-radius: 100px;
        font-size: 0.62rem;
        font-weight: 700;
        letter-spacing: 3px;
        text-transform: uppercase;
      }
      .logo-sub {
        font-size: 0.68rem;
        font-weight: 500;
        color: rgba(255, 255, 255, 0.3);
        text-transform: uppercase;
        letter-spacing: 4px;
      }

      /* ── Tagline ── */
      .tagline {
        font-family: "Syne", sans-serif;
        font-size: clamp(1rem, 3vw, 1.3rem);
        font-weight: 700;
        color: rgba(255, 255, 255, 0.65);
        letter-spacing: -0.3px;
        line-height: 1.5;
        max-width: 280px;
        animation: fadeDown 0.6s ease 0.1s both;
      }
      .tagline em {
        color: #ffd700;
        font-style: normal;
      }

      /* ── Spinner ── */
      .spinner-wrap {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 14px;
        animation: fadeDown 0.6s ease 0.2s both;
      }
      .spinner {
        width: 46px;
        height: 46px;
        border: 4px solid rgba(255, 215, 0, 0.15);
        border-top-color: #ffd700;
        border-radius: 50%;
        animation: spin 0.9s linear infinite;
      }
      .spinner-label {
        font-size: 0.7rem;
        color: rgba(255, 255, 255, 0.28);
        text-transform: uppercase;
        letter-spacing: 3px;
        font-weight: 500;
      }

      /* ── Progress bar ── */
      .progress-track {
        width: min(260px, 70vw);
        height: 3px;
        background: rgba(255, 255, 255, 0.08);
        border-radius: 3px;
        overflow: hidden;
        animation: fadeDown 0.6s ease 0.3s both;
      }
      .progress-fill {
        height: 100%;
        background: linear-gradient(90deg, #ffd700, #f5c200);
        border-radius: 3px;
        animation: progress 2.2s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        width: 0%;
      }
      @keyframes progress {
        0% {
          width: 0%;
        }
        60% {
          width: 75%;
        }
        90% {
          width: 92%;
        }
        100% {
          width: 100%;
        }
      }

      /* ── Dots ── */
      .dots {
        display: flex;
        gap: 8px;
        animation: fadeDown 0.6s ease 0.35s both;
      }
      .dot {
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: rgba(255, 215, 0, 0.3);
        animation: dotPulse 1.4s ease-in-out infinite;
      }
      .dot:nth-child(2) {
        animation-delay: 0.2s;
      }
      .dot:nth-child(3) {
        animation-delay: 0.4s;
      }
      @keyframes dotPulse {
        0%,
        100% {
          background: rgba(255, 215, 0, 0.2);
          transform: scale(1);
        }
        50% {
          background: rgba(255, 215, 0, 0.9);
          transform: scale(1.3);
        }
      }

      /* ── Keyframes ── */
      @keyframes fadeDown {
        from {
          opacity: 0;
          transform: translateY(-14px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <div class="bg-circle bg-circle-1"></div>
    <div class="bg-circle bg-circle-2"></div>
    <div class="bg-text">IKEA</div>

    <div class="card">
      <div class="logo-wrap">
        <div class="logo">IKEA</div>
        <div class="logo-badge">Investment Platform</div>
        <div class="logo-sub">India &nbsp;·&nbsp; Home &amp; Living</div>
      </div>

      <div class="tagline">Invest Smart.<br /><em>Earn Daily.</em></div>

      <div class="spinner-wrap">
        <div class="spinner"></div>
        <div class="spinner-label">Loading</div>
      </div>

      <div class="progress-track">
        <div class="progress-fill"></div>
      </div>

      <div class="dots">
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
      </div>
    </div>

    <script>
      setTimeout(() => {
        window.location.href = "home/index.html";
      }, 2200);
    </script>
  </body>
</html>
