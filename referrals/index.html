<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Team Center | IKEA India</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#FFD700" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../referrals/style.css" />
  </head>
  <body>
    <!-- PAGE LOADER -->
    <div id="pageLoader">
      <div class="loader-logo">IKEA</div>
      <div class="loader-bar"></div>
    </div>

    <!-- TOAST -->
    <div class="toast" id="toast">
      <i class="fa-solid fa-circle-check"></i>
      <span id="toastMsg">Copied!</span>
    </div>

    <!-- NAVBAR -->
    <nav class="navbar">
      <div class="nav-logo">IKEA <span>India – Team Center</span></div>
    </nav>

    <!-- PAGE HEADER -->
    <div class="page-header">
      <div class="breadcrumb">
        <a href="../home/index.html">Home</a>
        <i class="fa-solid fa-chevron-right"></i> <span>Teams</span>
      </div>
      <h1>Team Center</h1>
      <p>Invite friends & earn commission on every plan they buy</p>
    </div>

    <!-- STATS STRIP -->
    <div class="stats-strip">
      <div class="stat-box">
        <div class="stat-box-num" id="statTotalRefs">0</div>
        <div class="stat-box-label">Total Referrals</div>
      </div>
      <div class="stat-box">
        <div class="stat-box-num" id="statTotalEarned">₹0</div>
        <div class="stat-box-label">Total Earned</div>
      </div>
      <div class="stat-box">
        <div class="stat-box-num" id="statActiveRefs">0</div>
        <div class="stat-box-label">Active Refs</div>
      </div>
    </div>

    <div class="container">
      <div class="page-title">
        <i class="fa-solid fa-gift"></i> Referral Center
      </div>

      <!-- CARD: REFERRAL LINK -->
      <div class="card">
        <div class="card-header">
          <i class="fa-solid fa-link"></i> <span>Your Referral Link</span>
        </div>
        <div class="referral-box">
          <div class="referral-input-wrap">
            <i class="fa-solid fa-link"></i>
            <input
              type="text"
              id="referralLink"
              readonly
              placeholder="Loading..."
            />
          </div>
          <button id="copyBtn" onclick="copyReferralLink()">
            <i class="fa-solid fa-copy"></i> Copy
          </button>
        </div>
        <div class="share-row">
          <button class="share-btn whatsapp" onclick="shareSocial('whatsapp')">
            <i class="fa-brands fa-whatsapp"></i> WhatsApp
          </button>
          <button class="share-btn telegram" onclick="shareSocial('telegram')">
            <i class="fa-brands fa-telegram"></i> Telegram
          </button>
          <button class="share-btn" onclick="shareSocial('native')">
            <i class="fa-solid fa-share-nodes"></i> Share
          </button>
        </div>
      </div>

      <!-- CARD: MY REFERRALS LIST -->
      <div class="card">
        <div class="card-header">
          <i class="fa-solid fa-people-group"></i>
          <span>Recent Referrals (<span id="msCount">0</span>)</span>
        </div>
        <!-- Matches JS ID "memberList" -->
        <div class="referral-list" id="memberList"></div>
      </div>
    </div>

    <!-- BOTTOM NAV -->
    <nav class="bottom-nav">
      <a href="../home/index.html" class="nav-btn"
        ><i class="fa-solid fa-house"></i><span>Home</span></a
      >
      <a href="../products/index.html" class="nav-btn"
        ><i class="fa-solid fa-couch"></i><span>Shop</span></a
      >
      <a href="../referrals/index.html" class="nav-btn active"
        ><i class="fa-solid fa-user-plus"></i><span>Team</span></a
      >
      <a href="../profile/index.html" class="nav-btn"
        ><i class="fa-solid fa-circle-user"></i><span>Mine</span></a
      >
    </nav>

    <script src="../shared/js/config.js"></script>
    <script src="../referrals/script.js"></script>
  </body>
</html>
